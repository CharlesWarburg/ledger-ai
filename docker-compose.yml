services:
  postgres:
    image: postgres:16
    container_name: ledger-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-3pK9vTq8Lm2xN7sR4aW6cY1u}
      POSTGRES_DB: ${POSTGRES_DB:-ledger_ai}

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
