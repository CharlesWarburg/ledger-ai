services:
  postgres:
    image: postgres:16
    container_name: ledger-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledgerpassword
      POSTGRES_DB: ledger_ai

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: